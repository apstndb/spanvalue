# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Avoid stale module/build caches that can surface impossible typecheck
          # failures even when the current tree passes locally.
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Test
        run: go test -v ./...

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Nested module may require a newer Go than the root library (see integration/go.mod).
          go-version-file: integration/pgtypeannotation/go.mod
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Integration tests (pgtypeannotation)
        run: make test-integration
