# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Show checked out source
      run: |
        git rev-parse HEAD
        git status --short
        sed -n '1,20p' simple.go
        grep -n 'SimpleFormatConfig' simple.go common_test.go

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.23.2'
        # Avoid stale module/build caches that can surface impossible typecheck
        # failures even when the current tree passes locally.
        cache: false

    - name: Clear Go caches
      run: go clean -cache -testcache

    - name: Test
      run: go test -v ./...
