# CI mirrors local `make check` (fmt-check, vet, build, test, lint) plus
# race detection, Example tests, and scheduled govulncheck.

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
  # Weekly vulnerability scan (Sunday 00:00 UTC).
  - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Avoid stale module/build caches that can surface impossible typecheck
          # failures even when the current tree passes locally.
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          install-only: true

      - name: make check
        run: make check

  race:
    name: race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Test with race detector
        run: go test -race ./...

  examples:
    name: example tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Run Example tests
        run: go test -run '^Example' ./...

  gospanner:
    name: dbsqlrows/gospanner (go 1.25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: dbsqlrows/gospanner/go.mod
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Test gospanner nested module
        working-directory: dbsqlrows/gospanner
        run: go test ./...

  govulncheck:
    name: govulncheck
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
