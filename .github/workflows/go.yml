# CI mirrors local `make check` (fmt-check, vet, build, test, lint) plus
# race detection, Example tests, and govulncheck (PR-blocking; also scheduled
# weekly to catch newly published advisories without a code change).

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
  # Weekly vulnerability scan (Sunday 00:00 UTC).
  - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Avoid stale module/build caches that can surface impossible typecheck
          # failures even when the current tree passes locally.
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          install-only: true

      - name: make check
        run: make check

  race:
    name: race detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Test with race detector
        run: go test -race ./...

  examples:
    name: example tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Run Example tests
        run: go test -run '^Example' ./...

  gospanner:
    name: dbsqlrows/gospanner (go 1.25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: dbsqlrows/gospanner/go.mod
          cache: false

      - name: Clear Go caches
        run: go clean -cache -testcache

      - name: Test gospanner nested module
        working-directory: dbsqlrows/gospanner
        run: go test ./...

  govulncheck:
    name: govulncheck
    # Runs on every trigger (push, pull_request, schedule) and is PR-blocking:
    # the baseline is clean at the symbol level (#177), so any reachable
    # finding is a regression. The weekly schedule still catches advisories
    # published between merges.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # golang.org/x/vuln v1.2.0+ requires Go 1.25 to install. Other jobs use
      # go.mod's minimum (1.24); this job tracks the latest patched 1.25.x so
      # stdlib findings stay current without manual pin bumps. Dependency
      # reachability is the main signal for this library module.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          # Without check-latest, setup-go may resolve a stale preinstalled
          # 1.25 patch release whose stdlib still carries fixed advisories
          # (GO-2026-5037/5039), making this job flap across runners.
          check-latest: true
          cache: false

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
