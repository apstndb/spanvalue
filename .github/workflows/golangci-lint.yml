name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Avoid stale module/build caches that can surface old typecheck
          # results in golangci-lint.
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # The action cache has produced stale typecheck results for this repo.
          # Run lint on the current tree instead of reusing cached analysis.
          skip-cache: true
          # Pin to a specific version to avoid unrelated PRs failing due to
          # newly added lint rules, and to mitigate supply chain risks.
          # Update this version when upgrading Go or intentionally adopting
          # new lint rules.
          version: v2.11.4
          args: --timeout=5m
