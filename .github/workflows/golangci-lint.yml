name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Show checked out source
        run: |
          git rev-parse HEAD
          git status --short
          sed -n '1,20p' simple.go
          grep -n 'SimpleFormatConfig' simple.go common_test.go
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23.2'
          # Avoid stale module/build caches that can surface old typecheck
          # results in golangci-lint.
          cache: false
      - name: Clear Go caches
        run: go clean -cache -testcache
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # The action cache has produced stale typecheck results for this repo.
          # Run lint on the current tree instead of reusing cached analysis.
          skip-cache: true
          # Pin to a specific version to avoid unrelated PRs failing due to
          # newly added lint rules, and to mitigate supply chain risks.
          # Update this version when upgrading Go or intentionally adopting
          # new lint rules.
          version: v2.11.4
          args: --timeout=5m
