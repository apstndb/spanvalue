name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # Use latest to avoid manually tracking golangci-lint releases.
          # Pinning requires updates whenever Go version changes (new Go
          # often needs new golangci-lint). The risk of breakage from
          # golangci-lint updates is low — new lint findings are fixable
          # and preferable to running a stale linter.
          version: latest
          args: --timeout=5m
