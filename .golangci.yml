version: "2"

linters:
  default: standard
  enable:
    - godoclint
  exclusions:
    # godoc-lint README: exclude test files from godoclint by default practice.
    rules:
      - path: _test\.go$
        linters:
          - godoclint

linters-settings:
  godoclint:
    default: basic
    enable:
      - no-unused-link
